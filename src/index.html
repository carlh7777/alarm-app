<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alarms</title>
    <script type="module" src="main.js" defer></script>
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="header-left">
          <h1>Alarms</h1>
          <button type="button" id="today-btn" class="btn">Today</button>
        </div>
        <div class="calendar-nav">
          <button type="button" id="prev-period" class="btn btn-icon" aria-label="Previous">‹</button>
          <h2 id="period-label" class="period-label"></h2>
          <button type="button" id="next-period" class="btn btn-icon" aria-label="Next">›</button>
        </div>
        <div class="header-right">
          <select id="secondary-tz" class="view-select tz-select" aria-label="Secondary timezone" title="Secondary timezone">
            <option value="America/Los_Angeles">PST – Pacific</option>
            <option value="Asia/Tokyo">JST – Tokyo</option>
            <option value="America/New_York">EST – Eastern</option>
            <option value="Europe/London">GMT – London</option>
            <option value="UTC">UTC</option>
          </select>
          <select id="view-select" class="view-select" aria-label="Calendar view">
            <option value="month">Month</option>
            <option value="week">Week</option>
          </select>
          <button type="button" id="add-btn" class="btn btn-primary">+ Create</button>
        </div>
      </header>

      <div class="main-layout">
        <section class="calendar-section" aria-label="Calendar">
          <div id="month-view" class="month-view">
            <div class="weekday-header">
              <span>Sun</span>
              <span>Mon</span>
              <span>Tue</span>
              <span>Wed</span>
              <span>Thu</span>
              <span>Fri</span>
              <span>Sat</span>
            </div>
            <div id="calendar-grid" class="calendar-grid"></div>
          </div>

          <div id="week-view" class="week-view hidden">
            <div id="week-header" class="week-header"></div>
            <div class="week-scroll" id="week-scroll">
              <div class="week-body">
                <div id="time-gutter" class="time-gutter"></div>
                <div class="week-columns-wrap">
                  <div id="week-columns" class="week-columns"></div>
                  <div id="now-indicator" class="now-indicator hidden" aria-hidden="true">
                    <div class="now-dot"></div>
                    <div class="now-line-bar"></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </section>

        <aside class="sidebar">
          <h2 class="sidebar-title">All alarms</h2>
          <section id="alarm-list" class="alarm-list"></section>
        </aside>
      </div>
    </div>

    <div id="editor-backdrop" class="editor-backdrop hidden">
      <section id="editor" class="editor">
        <div class="editor-header">
          <h2 id="editor-title">New alarm</h2>
          <button type="button" id="close-editor" class="btn btn-icon" aria-label="Close">×</button>
        </div>
        <form id="alarm-form">
          <input type="hidden" id="alarm-id" />

          <label class="field">
            <span>Label</span>
            <input type="text" id="alarm-label" placeholder="Wake up" required />
          </label>

          <label class="field" id="once-date-field">
            <span>Date</span>
            <input type="date" id="alarm-date" />
          </label>

          <div class="field-row">
            <label class="field">
              <span>Hour</span>
              <input type="number" id="alarm-hour" min="0" max="23" value="9" required />
            </label>
            <label class="field">
              <span>Minute</span>
              <input type="number" id="alarm-minute" min="0" max="59" value="0" required />
            </label>
          </div>

          <label class="field">
            <span>Repeat</span>
            <select id="alarm-recurrence">
              <option value="once">Once</option>
              <option value="daily">Daily</option>
              <option value="weekdays">Weekdays</option>
              <option value="weekly">Weekly</option>
            </select>
          </label>

          <fieldset id="weekly-days" class="weekly-days hidden">
            <legend>Days</legend>
            <div class="day-grid">
              <label><input type="checkbox" value="0" /> Mon</label>
              <label><input type="checkbox" value="1" /> Tue</label>
              <label><input type="checkbox" value="2" /> Wed</label>
              <label><input type="checkbox" value="3" /> Thu</label>
              <label><input type="checkbox" value="4" /> Fri</label>
              <label><input type="checkbox" value="5" /> Sat</label>
              <label><input type="checkbox" value="6" /> Sun</label>
            </div>
          </fieldset>

          <fieldset class="remind-before">
            <legend>Notify before</legend>
            <div class="day-grid">
              <label><input type="checkbox" name="remind-before" value="5" /> 5 min</label>
              <label><input type="checkbox" name="remind-before" value="10" /> 10 min</label>
              <label><input type="checkbox" name="remind-before" value="15" /> 15 min</label>
              <label><input type="checkbox" name="remind-before" value="30" /> 30 min</label>
            </div>
          </fieldset>

          <label class="field checkbox-field hidden" id="enabled-field">
            <input type="checkbox" id="alarm-enabled" checked />
            <span>Enabled</span>
          </label>

          <div class="form-actions">
            <button type="button" id="cancel-btn" class="btn">Cancel</button>
            <button type="submit" class="btn btn-primary">Save</button>
          </div>
        </form>
      </section>
    </div>
  </body>
</html>
